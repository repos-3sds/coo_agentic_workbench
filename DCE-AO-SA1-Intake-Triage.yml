    - data:
        code: "import json\nimport urllib.request\nimport re\nimport ssl\n\n\
          MCP_URL = \"https://dcemcptools-production.up.railway.app/mcp\"\nHEADERS\
          \ = {\"Content-Type\": \"application/json\", \"Accept\": \"application/json,\
          \ text/event-stream\"}\nSSL_CTX = ssl.create_default_context()\nSSL_CTX.check_hostname\
          \ = False\nSSL_CTX.verify_mode = ssl.CERT_NONE\n\ndef mcp_call(method_name,\
          \ arguments, req_id=1):\n    body = json.dumps({\n        \"jsonrpc\": \"\
          2.0\", \"id\": req_id,\n        \"method\": \"initialize\",\n        \"\
          params\": {\"protocolVersion\": \"2025-03-26\", \"capabilities\": {},\n\
          \                   \"clientInfo\": {\"name\": \"dify-sa1\", \"version\"\
          : \"1.0\"}}\n    }).encode()\n    req = urllib.request.Request(MCP_URL, data=body,\
          \ headers=HEADERS, method=\"POST\")\n    resp = urllib.request.urlopen(req,\
          \ timeout=30, context=SSL_CTX)\n    resp.read()\n    session_id = resp.headers.get(\"\
          Mcp-Session-Id\", \"\")\n    h = dict(HEADERS)\n    h[\"Mcp-Session-Id\"\
          ] = session_id\n    tool_body = json.dumps({\n        \"jsonrpc\": \"2.0\"\
          , \"id\": req_id + 1,\n        \"method\": \"tools/call\",\n        \"\
          params\": {\"name\": method_name, \"arguments\": arguments}\n    }).encode()\n\
          \    req2 = urllib.request.Request(MCP_URL, data=tool_body, headers=h, method=\"\
          POST\")\n    resp2 = urllib.request.urlopen(req2, timeout=60, context=SSL_CTX)\n\    raw = resp2.read().decode()\n    for line in raw.split(\"\
          \\n\"):\n        line = line.strip()\n        if line.startswith(\"data:\"\
          ):\n            data_str = line[5:].strip()\n            try:\n         \
          \       rpc = json.loads(data_str)\n                content = rpc.get(\"\
          result\", {}).get(\"content\", [])\n                if content and content[0].get(\"\
          text\"):\n                    return content[0][\"text\"]\n             \
          \   sc = rpc.get(\"result\", {}).get(\"structuredContent\")\n            \
          \    if sc:\n                    return json.dumps(sc)\n            except\
          \ Exception:\n                return data_str\n    return raw\n\ndef main(validated_output:\
          \ str, submission_source: str, received_at: str, rm_employee_id: str, raw_payload_json:\
          \ str) -> dict:\n    vo = json.loads(validated_output)\n    payload = {}\n\
          \    try:\n        payload = json.loads(raw_payload_json) if raw_payload_json\
          \ else {}\n    except Exception:\n        pass\n\n    create_args = {\n\
          \        \"submission_source\": submission_source,\n        \"received_at\"\
          : received_at,\n        \"rm_employee_id\": rm_employee_id,\n        \"\
          account_type\": vo.get(\"account_type\", \"INSTITUTIONAL_FUTURES\"),\n  \
          \      \"account_type_confidence\": vo.get(\"account_type_confidence\",\
          \ 0.9),\n        \"account_type_reasoning\": vo.get(\"account_type_reasoning\"\
          , \"\"),\n        \"client_name\": vo.get(\"client_name\", \"\"),\n     \
          \   \"client_entity_type\": vo.get(\"client_entity_type\", \"CORP\"),\n\
          \        \"jurisdiction\": vo.get(\"jurisdiction\", \"SGP\"),\n        \"\
          products_requested\": vo.get(\"products_requested\", \"[]\"),\n        \"\
          priority\": vo.get(\"priority\", \"STANDARD\"),\n        \"priority_reason\"\
          : vo.get(\"priority_reason\", \"\"),\n        \"sla_deadline\": vo.get(\"\
          sla_deadline\", \"\"),\n        \"flagged_for_review\": vo.get(\"flagged_for_review\"\
          , False),\n        \"email_message_id\": payload.get(\"email_message_id\"\
          , \"\"),\n        \"sender_email\": payload.get(\"sender_email\", \"\"),\n\
          \        \"email_subject\": payload.get(\"subject\", \"\"),\n        \"\
          email_body_text\": payload.get(\"body_text\", \"\"),\n        \"attachments_count\"\
          : len(payload.get(\"attachments\", [])),\n        \"rm_name\": rm_employee_id,\n\
          \        \"rm_email\": payload.get(\"sender_email\", \"\"),\n        \"\
          rm_branch\": \"DCE Branch\",\n        \"rm_desk\": \"DCE Sales Desk\",\n\
          \        \"rm_manager_id\": \"\",\n        \"rm_manager_name\": \"\",\n\
          \        \"rm_manager_email\": \"\",\n        \"rm_resolution_source\":\
          \ \"HR_SYSTEM\"\n    }\n    create_result = \"\"\n    case_id = \"UNKNOWN\"\
          \n    try:\n        create_result = mcp_call(\"sa1_create_case_full\", create_args,\
          \ 1)\n        cr = json.loads(create_result) if isinstance(create_result,\
          \ str) else create_result\n        if isinstance(cr, dict) and cr.get(\"\
          case_id\"):\n            case_id = cr[\"case_id\"]\n    except Exception\
          \ as e:\n        create_result = str(e)\n    if case_id == \"UNKNOWN\":\n\
          \        m = re.search(r'AO-\\d{4}-\\d{6}', str(create_result))\n      \
          \  if m:\n            case_id = m.group()\n\n    n0_output = {\n        \"\
          case_id\": case_id,\n        \"account_type\": vo.get(\"account_type\",\
          \ \"\"),\n        \"priority\": vo.get(\"priority\", \"STANDARD\"),\n   \
          \     \"client_name\": vo.get(\"client_name\", \"\"),\n        \"next_node\"\
          : \"N-1\",\n        \"confidence\": vo.get(\"account_type_confidence\",\
          \ 0)\n    }\n    complete_result = \"\"\n    try:\n        complete_result\
          \ = mcp_call(\"sa1_complete_node\", {\n            \"case_id\": case_id,\
          \ \"status\": \"COMPLETE\",\n            \"attempt_number\": 1, \"output_json\"\
          : json.dumps(n0_output),\n            \"started_at\": received_at, \"notifications_sent\"\
          : True\n        }, 10)\n    except Exception as e:\n        complete_result\
          \ = str(e)\n\n    return {\n        \"case_id\": case_id,\n        \"n0_output\"\
          : json.dumps(n0_output),\n        \"create_result\": str(create_result)[:500],\n\
          \        \"complete_result\": str(complete_result)[:500]\n    }\n"
