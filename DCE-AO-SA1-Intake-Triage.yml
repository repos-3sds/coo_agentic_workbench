          \ str, case_id: str, rm_employee_id: str, received_at: str) -> dict:\n\
          \    raw = raw_payload_json.strip()\n    # Strip BOM\n    raw = raw.lstrip('\\\
          ufeff').lstrip('\\u200b')\n    # Strip markdown code fences\n    raw = re.sub(r'^```(?:json)?\\\\s*',\
          \ '', raw)\n    raw = re.sub(r'\\\\s*```$', '', raw)\n    raw = raw.strip()\n\
          \    # Fix smart quotes\n    raw = raw.replace('\\u201c', '\"').replace('\\\
          u201d', '\"').replace('\\u2018', \"'\").replace('\\u2019', \"'\")\n    #\
          \ Try parse; if double-escaped try again\n    parse_error = \"\"\n    try:\n\
          \        payload = json.loads(raw)\n        if isinstance(payload, str):\n\
          \            payload = json.loads(payload)\n    except Exception as e:\n\
          \        parse_error = str(e)\n        payload = {}\n    is_retry = bool(case_id\
          \ and case_id.strip())\n    return {\n        \"payload_parsed\": json.dumps(payload),\n\
          \        \"is_retry\": str(is_retry),\n        \"submission_source\": submission_source,\n\
          \        \"rm_employee_id\": rm_employee_id,\n        \"received_at\": received_at,\n\
          \        \"case_id\": case_id or \"\",\n        \"parse_error\": parse_error\n\
          \    }\n"
