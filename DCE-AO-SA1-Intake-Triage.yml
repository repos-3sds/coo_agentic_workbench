          \ = json.loads(match.group()) if match else json.loads(llm_output)\n   \
          \ except:\n        return {\"classification_json\": \"{}\", \"confidence\"\
          : \"0\", \"is_valid\": \"false\"}\n    confidence = float(cls.get(\"confidence\"\
          , 0))\n    cls[\"flagged_for_review\"] = confidence < 0.80\n    return {\n\
          \        \"classification_json\": json.dumps(cls),\n        \"confidence\"\
          : str(confidence),\n        \"is_valid\": str(confidence >= 0.70).lower()\n\
