            ACCOUNT TYPES: - INSTITUTIONAL_FUTURES: Corporate/FI entities requesting
            futures/options - RETAIL_FUTURES: Individual clients requesting futures/options
            - OTC_DERIVATIVES: Any entity requesting OTC derivative products - COMMODITIES_PHYSICAL:
            Physical commodity trading accounts - MULTI_PRODUCT: Requests spanning
            2+ categories

            ENTITY TYPES: CORP, FUND, FI, SPV, INDIVIDUAL JURISDICTIONS: SGP, HKG,
            CHN, OTHER

            CONFIDENCE: 0.90-1.00 clear match, 0.80-0.89 strong inference, 0.70-0.79
            needs review, below 0.70 flag for RM.

            Respond with ONLY valid JSON: {"account_type":"...","confidence":0.0,"account_type_reasoning":"...","client_name":"...","client_entity_type":"...","jurisdiction":"...","products_requested":["..."]}'
        - id: sa1-usr-classify
          role: user
          text: 'Classify this submission:

