                    "credit_outcome", "approved_dce_limit_sgd", "approved_dce_pce_limit_sgd",
                    "confirmed_caa_approach", "conditions", "credit_team_id",
                    "credit_team_name", "decided_at",
                ]
                missing = [
                    f for f in mandatory
                    if f not in decisions or (f not in ("conditions",) and decisions[f] is None)
                ]
                credit_outcome = str(decisions.get("credit_outcome", "")).upper()
                credit_brief_id = decisions.get("credit_brief_id", "")
                return {
                    "result": {
                        "validation_status": "COMPLETE" if not missing else "INCOMPLETE",
                        "missing_fields": missing,
                        "is_complete": len(missing) == 0,
                        "credit_decisions": decisions,
                        "credit_outcome": credit_outcome,
                        "credit_brief_id": credit_brief_id,
                    },
                    "fields_complete": "true" if not missing else "false",
                    "credit_outcome_str": credit_outcome,
                    "credit_brief_id": credit_brief_id,
                }
