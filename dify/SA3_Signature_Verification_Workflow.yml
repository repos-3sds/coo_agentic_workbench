    - data:
        code: |
          import json
          import ssl
          import urllib.request

          HEADERS = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream"}
          CTX = ssl.create_default_context()
          CTX.check_hostname = False
          CTX.verify_mode = ssl.CERT_NONE

          def mcp_call(mcp_url, method_name, arguments, req_id=1):
              body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id,
                  "method": "initialize",
                  "params": {"protocolVersion": "2025-03-26", "capabilities": {},
                             "clientInfo": {"name": "dify-sa3", "version": "1.0"}}
              }).encode()
              req = urllib.request.Request(mcp_url, data=body, headers=HEADERS, method="POST")
              resp = urllib.request.urlopen(req, timeout=30, context=CTX)
              resp.read()
              session_id = resp.headers.get("Mcp-Session-Id", "")
              h = dict(HEADERS)
              h["Mcp-Session-Id"] = session_id
              tool_body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id + 1,
                  "method": "tools/call",
                  "params": {"name": method_name, "arguments": arguments}
              }).encode()
              req2 = urllib.request.Request(mcp_url, data=tool_body, headers=h, method="POST")
              resp2 = urllib.request.urlopen(req2, timeout=60, context=CTX)
              raw = resp2.read().decode()
              for line in raw.split("\n"):
                  line = line.strip()
                  if line.startswith("data:"):
                      data_str = line[5:].strip()
                      try:
                          rpc = json.loads(data_str)
                          content = rpc.get("result", {}).get("content", [])
                          if content and content[0].get("text"):
                              return content[0]["text"]
                      except Exception:
                          return data_str
              return raw

          def main(case_id: str, classified_results_json: str, mcp_endpoint: str) -> dict:
              MCP_URL = (mcp_endpoint or "http://host.docker.internal:8001") + "/mcp"
              try:
                  classified = json.loads(classified_results_json or "[]")
                  escalated = [r for r in classified if r.get("confidence_tier") == "LOW"]
                  result_str = mcp_call(MCP_URL, "sa3_complete_node", {
                      "case_id": case_id,
                      "outcome": "ESCALATE_COMPLIANCE",
                      "escalation_reason": "Signature confidence below 60% threshold — mandatory compliance review",
                      "escalated_signatories_json": json.dumps(escalated)
                  }, 1)
                  return {
                      "next_node": "ESCALATE_COMPLIANCE",
                      "escalated_count": str(len(escalated)),
