    # ─────────────────────────────────────────────
    # Node 14: CODE — Decision Validator + Batch Processor
    # ─────────────────────────────────────────────
    - data:
        code: |
          import json

          def main(decisions_json: str, phase1_results_json: str) -> dict:
              try:
                  decisions = json.loads(decisions_json or "[]")
                  phase1 = json.loads(phase1_results_json or "[]")

                  # Build lookup by signatory_id
                  decision_map = {d.get("signatory_id"): d for d in decisions if isinstance(d, dict)}

                  approved = []
                  rejected = []
                  clarify = []
                  missing = []

                  for sig in phase1:
                      sig_id = sig.get("signatory_id")
                      decision = decision_map.get(sig_id)
                      if not decision:
                          missing.append(sig_id)
                          continue
                      outcome = decision.get("outcome", "").upper()
                      record = {
                          **sig,
                          "outcome": outcome,
                          "notes": decision.get("notes", ""),
                          "approving_officer_id": decision.get("approving_officer_id", ""),
                          "decided_at": decision.get("decided_at", "")
                      }
                      if outcome == "APPROVED":
                          approved.append(record)
                      elif outcome == "REJECTED":
                          rejected.append(record)
                      elif outcome == "CLARIFY":
                          clarify.append(record)
                      else:
                          missing.append(sig_id)

                  all_decided = len(missing) == 0
                  has_rejections = len(rejected) > 0
                  has_clarify = len(clarify) > 0

                  return {
                      "approved_json": json.dumps(approved),
                      "rejected_json": json.dumps(rejected),
                      "clarify_json": json.dumps(clarify),
                      "missing_json": json.dumps(missing),
                      "all_decided": "true" if all_decided else "false",
                      "has_rejections": "true" if has_rejections else "false",
                      "has_clarify": "true" if has_clarify else "false",
                      "approved_count": str(len(approved)),
                      "rejected_count": str(len(rejected)),
                      "clarify_count": str(len(clarify))
                  }
              except Exception as e:
                  return {
                      "approved_json": "[]",
                      "rejected_json": "[]",
                      "clarify_json": "[]",
                      "missing_json": "[]",
                      "all_decided": "false",
                      "has_rejections": "false",
                      "has_clarify": "false",
                      "approved_count": "0",
                      "rejected_count": "0",
                      "clarify_count": "0"
                  }
        code_language: python3
        desc: >-
          Validates completeness of HITL decisions — every Phase 1 signatory must
          have a decision. Segregates: approved[], rejected[], clarify[].
          Incomplete submissions return missing_signatories[] highlighted.
        outputs:
          all_decided:
            children: null
            type: string
          approved_count:
            children: null
            type: string
          approved_json:
