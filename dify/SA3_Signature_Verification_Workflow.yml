    # ─────────────────────────────────────────────
    - data:
        code: |
          import json
          import ssl
          import urllib.request
          from datetime import datetime, timedelta

          HEADERS = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream"}
          CTX = ssl.create_default_context()
          CTX.check_hostname = False
          CTX.verify_mode = ssl.CERT_NONE

          SLA_HOURS = {"URGENT": 4, "STANDARD": 24, "DEFERRED": 48}

          def mcp_call(mcp_url, method_name, arguments, req_id=1):
              body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id,
                  "method": "initialize",
                  "params": {"protocolVersion": "2025-03-26", "capabilities": {},
                             "clientInfo": {"name": "dify-sa3", "version": "1.0"}}
              }).encode()
              req = urllib.request.Request(mcp_url, data=body, headers=HEADERS, method="POST")
              resp = urllib.request.urlopen(req, timeout=30, context=CTX)
              resp.read()
              session_id = resp.headers.get("Mcp-Session-Id", "")
              h = dict(HEADERS)
              h["Mcp-Session-Id"] = session_id
              tool_body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id + 1,
                  "method": "tools/call",
                  "params": {"name": method_name, "arguments": arguments}
              }).encode()
              req2 = urllib.request.Request(mcp_url, data=tool_body, headers=h, method="POST")
              resp2 = urllib.request.urlopen(req2, timeout=60, context=CTX)
              raw = resp2.read().decode()
              for line in raw.split("\n"):
                  line = line.strip()
                  if line.startswith("data:"):
                      data_str = line[5:].strip()
                      try:
                          rpc = json.loads(data_str)
                          content = rpc.get("result", {}).get("content", [])
                          if content and content[0].get("text"):
                              return content[0]["text"]
                      except Exception:
                          return data_str
              return raw

          def main(case_id: str, verification_summary_text: str, classified_results_json: str,
                   priority_ctx: str, rm_name_ctx: str, mcp_endpoint: str) -> dict:
              MCP_URL = (mcp_endpoint or "http://host.docker.internal:8001") + "/mcp"
              try:
                  priority = priority_ctx or "STANDARD"
                  sla_hours = SLA_HOURS.get(priority, 24)
                  deadline = (datetime.utcnow() + timedelta(hours=sla_hours)).strftime("%Y-%m-%dT%H:%M:%SZ")

                  try:
                      summary = json.loads(verification_summary_text)
                  except Exception:
                      summary = {"report": verification_summary_text[:2000]}

                  task_payload = {
                      "case_id": case_id,
                      "verification_report": summary,
                      "classified_results": json.loads(classified_results_json or "[]"),
                      "rm_name": rm_name_ctx,
                      "priority": priority,
                      "deadline": deadline
                  }

                  result_str = mcp_call(MCP_URL, "sa3_park_for_hitl", {
                      "case_id": case_id,
                      "attempt_number": 1,
                      "task_payload_json": json.dumps(task_payload),
                      "priority": priority,
                      "deadline": deadline,
                      "assigned_to_id": None
                  }, 1)
                  result = json.loads(result_str) if isinstance(result_str, str) else result_str
                  return {
                      "hitl_task_id": result.get("hitl_task_id", ""),
                      "next_node": "HITL_PENDING",
                      "sla_deadline": deadline,
                      "result_json": json.dumps({
                          "case_id": case_id,
                          "status": "HITL_PENDING",
                          "hitl_task_id": result.get("hitl_task_id", ""),
                          "next_action": "DESK_SUPPORT_REVIEW",
                          "sla_deadline": deadline,
                          "next_node": "HITL_PENDING"
                      })
                  }
              except Exception as e:
                  return {
                      "hitl_task_id": "",
                      "next_node": "HITL_PENDING",
                      "sla_deadline": "",
                      "result_json": json.dumps({"case_id": case_id, "error": str(e)[:200],
                                                  "next_node": "HITL_PENDING"})
                  }
        code_language: python3
        desc: >-
          Atomic HITL parking: posts verification report to workbench queue, sends
          in-app notification to Desk Support, writes HITL_PENDING checkpoint to DB.
          Calls sa3_park_for_hitl MCP tool.
