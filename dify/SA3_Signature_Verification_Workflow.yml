      type: custom
      width: 242

    # ─────────────────────────────────────────────
    # Node 3: CODE — Phase 1 Context Injector (sa3_get_case_context TRIGGER)
    # ─────────────────────────────────────────────
    - data:
        code: |
          import json
          import ssl
          import urllib.request

          HEADERS = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream"}
          CTX = ssl.create_default_context()
          CTX.check_hostname = False
          CTX.verify_mode = ssl.CERT_NONE

          def mcp_call(mcp_url, method_name, arguments, req_id=1):
              body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id,
                  "method": "initialize",
                  "params": {"protocolVersion": "2025-03-26", "capabilities": {},
                             "clientInfo": {"name": "dify-sa3", "version": "1.0"}}
              }).encode()
              req = urllib.request.Request(mcp_url, data=body, headers=HEADERS, method="POST")
              resp = urllib.request.urlopen(req, timeout=30, context=CTX)
              resp.read()
              session_id = resp.headers.get("Mcp-Session-Id", "")
              h = dict(HEADERS)
              h["Mcp-Session-Id"] = session_id
              tool_body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id + 1,
                  "method": "tools/call",
                  "params": {"name": method_name, "arguments": arguments}
              }).encode()
              req2 = urllib.request.Request(mcp_url, data=tool_body, headers=h, method="POST")
              resp2 = urllib.request.urlopen(req2, timeout=60, context=CTX)
              raw = resp2.read().decode()
              for line in raw.split("\n"):
                  line = line.strip()
                  if line.startswith("data:"):
                      data_str = line[5:].strip()
                      try:
                          rpc = json.loads(data_str)
                          content = rpc.get("result", {}).get("content", [])
                          if content and content[0].get("text"):
                              return content[0]["text"]
                      except Exception:
                          return data_str
              return raw

          def main(case_id: str, mcp_endpoint: str) -> dict:
              MCP_URL = (mcp_endpoint or "http://host.docker.internal:8001") + "/mcp"
              try:
                  result_str = mcp_call(MCP_URL, "sa3_get_case_context",
                                        {"case_id": case_id, "mode": "PHASE1"}, 1)
                  ctx = json.loads(result_str) if isinstance(result_str, str) else result_str
                  case_state = ctx.get("case_state", {})
                  return {
                      "case_id_ctx": case_id,
                      "jurisdiction_ctx": case_state.get("jurisdiction", "SGP"),
                      "account_type_ctx": case_state.get("account_type", "CORPORATE"),
                      "priority_ctx": case_state.get("priority", "STANDARD"),
                      "n1_output_json": json.dumps(ctx.get("n1_output", {})),
                      "staged_docs_json": json.dumps(ctx.get("staged_docs", [])),
                      "rm_name_ctx": ctx.get("rm_hierarchy", {}).get("rm_name", ""),
                      "context_error": ""
                  }
              except Exception as e:
                  return {
                      "case_id_ctx": case_id,
                      "jurisdiction_ctx": "SGP",
                      "account_type_ctx": "CORPORATE",
                      "priority_ctx": "STANDARD",
                      "n1_output_json": "{}",
                      "staged_docs_json": "[]",
                      "rm_name_ctx": "",
                      "context_error": str(e)[:300]
                  }
        code_language: python3
        desc: 'Phase 1: Calls sa3_get_case_context (PHASE1 mode) — loads case state,
          N-1 output, staged documents, RM hierarchy for notification routing.'
        outputs:
          account_type_ctx:
            children: null
            type: string
          case_id_ctx:
            children: null
            type: string
          context_error:
            children: null
            type: string
          jurisdiction_ctx:
            children: null
            type: string
          n1_output_json:
            children: null
            type: string
          priority_ctx:
            children: null
            type: string
          rm_name_ctx:
            children: null
            type: string
          staged_docs_json:
            children: null
            type: string
        selected: false
        title: 'P1: Context Injector'
        type: code
        variables:
        - value_selector:
          - '3000000001'
          - case_id
          variable: case_id
        - value_selector:
          - env
          - MCP_ENDPOINT
          variable: mcp_endpoint
      height: 144
      id: '3000000003'
      position:
        x: 660
        y: 100
      type: custom
      width: 242

    # ─────────────────────────────────────────────
    # Node 4: KNOWLEDGE RETRIEVAL — KB-5 Signature Verification Guidelines
    # NOTE: After importing, open this node in Dify and select your KB-5 dataset.
    # ─────────────────────────────────────────────
    - data:
        dataset_configs:
          datasets:
            datasets: []
          retrieval_model: single
          score_threshold: 0.75
          score_threshold_enabled: true
          top_k: 3
        dataset_ids: []
        desc: >-
          Retrieves KB-5 confidence threshold definitions and evidence packaging
          requirements. Query: jurisdiction + entity type. Max 3 chunks, relevance > 0.75.
          IMPORTANT: After import, edit this node and select the KB-5 dataset you created.
        query_attachment_selector: []
        query_variable_selector:
        - '3000000003'
        - jurisdiction_ctx
        retrieval_mode: single
        selected: false
        single_retrieval_config:
          model:
            completion_params:
              temperature: 0.1
            mode: chat
            name: qwen2.5:7b
            provider: langgenius/ollama/ollama
          score_threshold: 0.75
          score_threshold_enabled: true
        title: 'KB-5: Signature Verification Guidelines'
        type: knowledge-retrieval
      height: 182
      id: '3000000004'
      position:
        x: 960
        y: 100
      type: custom
      width: 242

    # ─────────────────────────────────────────────
    # Node 5: CODE — Signature Analysis Batch (sa3_run_signature_analysis_batch)
    # ─────────────────────────────────────────────
    - data:
        code: |
          import json
          import ssl
          import urllib.request

          HEADERS = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream"}
          CTX = ssl.create_default_context()
          CTX.check_hostname = False
          CTX.verify_mode = ssl.CERT_NONE

          def mcp_call(mcp_url, method_name, arguments, req_id=1):
              body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id,
                  "method": "initialize",
                  "params": {"protocolVersion": "2025-03-26", "capabilities": {},
                             "clientInfo": {"name": "dify-sa3", "version": "1.0"}}
              }).encode()
              req = urllib.request.Request(mcp_url, data=body, headers=HEADERS, method="POST")
              resp = urllib.request.urlopen(req, timeout=30, context=CTX)
              resp.read()
              session_id = resp.headers.get("Mcp-Session-Id", "")
              h = dict(HEADERS)
              h["Mcp-Session-Id"] = session_id
              tool_body = json.dumps({
                  "jsonrpc": "2.0", "id": req_id + 1,
                  "method": "tools/call",
                  "params": {"name": method_name, "arguments": arguments}
              }).encode()
              req2 = urllib.request.Request(mcp_url, data=tool_body, headers=h, method="POST")
              resp2 = urllib.request.urlopen(req2, timeout=90, context=CTX)
              raw = resp2.read().decode()
              for line in raw.split("\n"):
                  line = line.strip()
                  if line.startswith("data:"):
                      data_str = line[5:].strip()
                      try:
                          rpc = json.loads(data_str)
                          content = rpc.get("result", {}).get("content", [])
                          if content and content[0].get("text"):
                              return content[0]["text"]
                      except Exception:
                          return data_str
              return raw

          def build_mock_analysis(staged_docs):
              """
              Build simulated analysis results from staged documents.
              In production, this is replaced by actual signature extraction model (API-7).
              Simulates extraction of signatories from staged documents.
              """
              docs = staged_docs if isinstance(staged_docs, list) else []
              signatories = []
              for i, doc in enumerate(docs[:3]):
                  doc_id = doc.get("document_id", f"DOC-{i+1:06d}") if isinstance(doc, dict) else f"DOC-{i+1:06d}"
                  sig_id = f"SIG-{i+1:03d}"
                  signatories.append({
                      "signatory_id": sig_id,
                      "signatory_name": f"Signatory {i+1}",
                      "authority_status": "AUTHORISED",
                      "role_in_mandate": "Director" if i == 0 else "Authorised Signatory",
                      "confidence_score": 88.5 - (i * 10),
                      "source_doc_ids": [doc_id],
                      "id_doc_ref": f"ID-{i+1:06d}",
                      "comparison_overlay_ref": f"mongo://overlays/{sig_id}-overlay.png",
                      "signature_crop_refs": [f"mongo://crops/{sig_id}-crop-1.png"]
                  })
              if not signatories:
                  signatories.append({
                      "signatory_id": "SIG-001",
                      "signatory_name": "Primary Signatory",
                      "authority_status": "AUTHORISED",
                      "role_in_mandate": "Director",
                      "confidence_score": 88.5,
                      "source_doc_ids": ["DOC-000001"],
                      "id_doc_ref": "ID-000001",
                      "comparison_overlay_ref": "mongo://overlays/SIG-001-overlay.png",
                      "signature_crop_refs": ["mongo://crops/SIG-001-crop-1.png"]
                  })
              return signatories

          def main(case_id: str, staged_docs_json: str, mcp_endpoint: str) -> dict:
              MCP_URL = (mcp_endpoint or "http://host.docker.internal:8001") + "/mcp"
              try:
                  staged_docs = json.loads(staged_docs_json or "[]")
                  analysis_results = build_mock_analysis(staged_docs)
                  result_str = mcp_call(MCP_URL, "sa3_run_signature_analysis_batch", {
                      "case_id": case_id,
                      "attempt_number": 1,
                      "analysis_results_json": json.dumps(analysis_results)
                  }, 1)
                  result = json.loads(result_str) if isinstance(result_str, str) else result_str
                  return {
                      "analysis_results_json": json.dumps(result.get("results", analysis_results)),
                      "overall_status": result.get("overall_status", "MIXED_FLAGS"),
                      "signatory_count": str(len(analysis_results)),
                      "analysis_error": ""
                  }
              except Exception as e:
                  return {
                      "analysis_results_json": "[]",
                      "overall_status": "ERROR",
                      "signatory_count": "0",
                      "analysis_error": str(e)[:300]
                  }
        code_language: python3
        desc: >-
          Calls sa3_run_signature_analysis_batch — runs signature extraction (API-7),
          authority check, and confidence-scored comparison for all signatories.
          Returns per-signatory results and overall_status (ALL_HIGH/MIXED_FLAGS/HAS_ESCALATIONS).
        outputs:
          analysis_error:
            children: null
            type: string
          analysis_results_json:
            children: null
            type: string
          overall_status:
            children: null
            type: string
          signatory_count:
            children: null
            type: string
        selected: false
        title: 'P1: Signature Analysis Batch'
        type: code
        variables:
        - value_selector:
          - '3000000003'
          - case_id_ctx
          variable: case_id
        - value_selector:
          - '3000000003'
          - staged_docs_json
          variable: staged_docs_json
        - value_selector:
          - env
          - MCP_ENDPOINT
          variable: mcp_endpoint
      height: 144
      id: '3000000005'
      position:
        x: 1260
        y: 100
      type: custom
      width: 242

    # ─────────────────────────────────────────────
    # Node 6: CODE — Confidence Tier Classifier (Deterministic)
    # ─────────────────────────────────────────────
    - data:
        code: |
          import json

          HIGH_THRESHOLD = 85.0
          MEDIUM_THRESHOLD = 60.0

          def classify_tier(score):
              if score >= HIGH_THRESHOLD:
                  return "HIGH"
              elif score >= MEDIUM_THRESHOLD:
                  return "MEDIUM"
              else:
                  return "LOW"

          def main(analysis_results_json: str, overall_status: str) -> dict:
              try:
                  results = json.loads(analysis_results_json or "[]")
                  classified = []
                  has_low = False
                  has_medium = False
                  flag_count = 0

                  for r in results:
                      score = float(r.get("confidence_score", 0))
                      tier = classify_tier(score)
                      flag_for_review = (tier == "MEDIUM")
                      escalate = (tier == "LOW")

                      if tier == "LOW":
                          has_low = True
                          flag_count += 1
                      elif tier == "MEDIUM":
                          has_medium = True
                          flag_count += 1

                      classified.append({
                          **r,
                          "confidence_tier": tier,
                          "flag_for_review": flag_for_review,
                          "escalate_immediate": escalate
                      })

                  if has_low:
                      computed_status = "HAS_ESCALATIONS"
                  elif has_medium:
                      computed_status = "MIXED_FLAGS"
                  else:
                      computed_status = "ALL_HIGH"

                  return {
                      "classified_results_json": json.dumps(classified),
                      "has_low_confidence": "true" if has_low else "false",
                      "has_medium_confidence": "true" if has_medium else "false",
                      "computed_overall_status": computed_status,
                      "flag_count": str(flag_count),
