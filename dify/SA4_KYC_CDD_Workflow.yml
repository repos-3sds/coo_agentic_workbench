      - data:
          code: |
            import urllib.request, json, uuid, re

            def main(case_id: str, entity_result: dict, screening_result: dict,
                     registry_result: dict, llm_brief: str, mcp_endpoint: str) -> dict:
                init_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 1, "method": "initialize",
                    "params": {"protocolVersion": "2024-11-05", "capabilities": {},
                               "clientInfo": {"name": "dify-sa4", "version": "1.0"}}
                }).encode()
                init_resp = urllib.request.urlopen(
                    urllib.request.Request(f"{mcp_endpoint}/mcp", data=init_payload, headers={
                        "Content-Type": "application/json",
                        "Accept": "application/json, text/event-stream"
                    }, method="POST"), timeout=30)
                session_id = init_resp.headers.get("mcp-session-id", "")
                headers = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream", "Mcp-Session-Id": session_id}
                brief_id = entity_result.get("brief_id", "")
                # Extract suggested risk range from LLM output
                risk_match = re.search(r"(?i)(LOW|MEDIUM|HIGH)", llm_brief[-500:])
                suggested_risk = risk_match.group(1).upper() if risk_match else "MEDIUM"
                open_questions = ["See detailed brief for RM review items"]
                tool_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                    "params": {"name": "sa4_compile_and_submit_kyc_brief",
                               "arguments": {
                                   "case_id": case_id,
                                   "brief_id": brief_id,
                                   "entity_structure": entity_result.get("entity_structure", {}),
                                   "screening_summary": {
                                       "overall_sanctions_status": screening_result.get("overall_sanctions_status", "CLEAR"),
                                       "pep_flag_count": screening_result.get("pep_flag_count", 0),
                                       "adverse_media_found": screening_result.get("adverse_media_found", False),
                                       "names_screened": screening_result.get("names_screened", 0),
                                   },
                                   "registry_data": registry_result.get("registry_data", {}),
                                   "open_questions": open_questions,
                                   "suggested_risk_range": suggested_risk,
                                   "is_retail_investor": False,
                                   "kb_chunks_used": ["KB-4", "KB-3", "KB-6"]
                               }}
                }).encode()
                req = urllib.request.Request(f"{mcp_endpoint}/mcp", data=tool_payload, headers=headers, method="POST")
                resp = urllib.request.urlopen(req, timeout=30)
                raw = resp.read().decode()
                result = next((json.loads(l[6:]) for l in raw.split('\n') if l.startswith('data: ')), {})
                content = result.get("result", {}).get("content", [{}])
                text = content[0].get("text", "{}") if content else "{}"
                return {"result": json.loads(text)}
