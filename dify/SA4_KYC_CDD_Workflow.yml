      # ────────────────────────────────────────────────────
      - data:
          code: |
            import json

            def main(rm_decisions_raw: str, case_id: str) -> dict:
                try:
                    decisions = json.loads(rm_decisions_raw) if isinstance(rm_decisions_raw, str) else rm_decisions_raw
                except (json.JSONDecodeError, TypeError):
                    return {"result": {"validation_status": "INCOMPLETE",
                                       "missing_fields": ["rm_decisions_parse_error"],
                                       "is_complete": False, "rm_decisions": {}},
                            "fields_complete": "false",
                            "kyc_risk_rating_str": ""}
                mandatory = ["kyc_risk_rating", "cdd_clearance", "bcap_clearance",
                             "caa_approach", "recommended_dce_limit_sgd",
                             "recommended_dce_pce_limit_sgd", "osca_case_number",
                             "limit_exposure_indication", "rm_id", "decided_at"]
                missing = [f for f in mandatory if f not in decisions or decisions[f] is None or decisions[f] == ""]
                kyc_rating = decisions.get("kyc_risk_rating", "")
                return {"result": {
                    "validation_status": "COMPLETE" if not missing else "INCOMPLETE",
                    "missing_fields": missing,
                    "is_complete": len(missing) == 0,
                    "rm_decisions": decisions,
                    "kyc_risk_rating": kyc_rating,
                },
                "fields_complete": "true" if not missing else "false",
                "kyc_risk_rating_str": kyc_rating}
          code_language: python3
