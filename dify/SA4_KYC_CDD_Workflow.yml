      # ────────────────────────────────────────────────────
      # Node 26: Complete Node (Checkpoint Writer)
      # ────────────────────────────────────────────────────
      - data:
          code: |
            import urllib.request, json, uuid

            def main(case_id: str, context_result: dict, validation_result: dict,
                     capture_result: dict, hitl_task_id: str, mcp_endpoint: str) -> dict:
                init_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 1, "method": "initialize",
                    "params": {"protocolVersion": "2024-11-05", "capabilities": {},
                               "clientInfo": {"name": "dify-sa4", "version": "1.0"}}
                }).encode()
                init_resp = urllib.request.urlopen(
                    urllib.request.Request(f"{mcp_endpoint}/mcp", data=init_payload, headers={
                        "Content-Type": "application/json",
                        "Accept": "application/json, text/event-stream"
                    }, method="POST"), timeout=30)
                session_id = init_resp.headers.get("mcp-session-id", "")
                headers = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream", "Mcp-Session-Id": session_id}
                prior_brief = context_result.get("prior_brief") or {}
                brief_id = prior_brief.get("brief_id", "")
                rm_decisions = validation_result.get("rm_decisions", {})
                decision_id = capture_result.get("decision_id", 0)
                n3_output = {
                    "case_id": case_id,
                    "kyc_brief_id": brief_id,
                    "brief_url": prior_brief.get("brief_url", ""),
                    "sanctions_status": prior_brief.get("sanctions_status", "CLEAR"),
                    "pep_flags_count": prior_brief.get("pep_flag_count", 0),
                    "adverse_media_found": prior_brief.get("adverse_media_found", False),
                    "names_screened_count": prior_brief.get("names_screened_count", 0),
                    "rm_decisions": rm_decisions,
                    "decision_id": decision_id,
                    "next_node": "N-4",
                }
                tool_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                    "params": {"name": "sa4_complete_node",
                               "arguments": {"case_id": case_id, "outcome": "RM_DECISION_CAPTURED",
                                             "brief_id": brief_id, "rm_decisions": rm_decisions,
                                             "n3_output": n3_output,
                                             "hitl_task_id": hitl_task_id}}
                }).encode()
                req = urllib.request.Request(f"{mcp_endpoint}/mcp", data=tool_payload, headers=headers, method="POST")
                resp = urllib.request.urlopen(req, timeout=30)
                raw = resp.read().decode()
                result = next((json.loads(l[6:]) for l in raw.split('\n') if l.startswith('data: ')), {})
                content = result.get("result", {}).get("content", [{}])
                text = content[0].get("text", "{}") if content else "{}"
                return {"result": json.loads(text), "n3_output": n3_output}
          code_language: python3
          desc: "MANDATORY: write N-3 COMPLETE checkpoint, advance to N-4, fire RM_DECISION_CAPTURED Kafka event"
          outputs:
            result: {children: null, type: object}
            n3_output: {children: null, type: object}
          title: "Complete Node (Checkpoint)"
          type: code
          variables:
            - value_selector: ["4000000001", case_id]
              variable: case_id
            - value_selector: ["4000000013", result]
              variable: context_result
            - value_selector: ["4000000019", result]
              variable: validation_result
            - value_selector: ["4000000025", result]
              variable: capture_result
            - value_selector: ["4000000001", hitl_task_id]
              variable: hitl_task_id
            - value_selector: [env, MCP_ENDPOINT]
              variable: mcp_endpoint
