                instruction_id = tmo_instruction.get("instruction_id", "")
                has_instruction = bool(instruction_id)
                # TMO execution is confirmed if we have an instruction AND status is past INSTRUCTION_GENERATED
                ready_statuses = [
                    "TMO_EXECUTION_COMPLETED", "TMO_EXECUTION_CONFIRMED",
                    "VALIDATION_PENDING", "VALIDATING"
                ]
                is_past_instruction = current_status in ready_statuses
                tmo_confirmed = has_instruction and is_past_instruction
                return {
                    "result": {
                        "has_instruction": has_instruction,
                        "instruction_id": instruction_id,
                        "current_status": current_status,
                        "is_past_instruction": is_past_instruction,
                        "tmo_confirmed": tmo_confirmed,
                    },
                    "tmo_confirmed": "true" if tmo_confirmed else "false",
                }
