app:
  description: >
    SA-6 Static Configuration Agent — Node N-5.
    Two-phase HITL workflow: Phase 1 (config spec build, TMO instruction generation,
    park for TMO execution) and Phase 2 (TMO execution validation, system config
    verification, checkpoint, advance to N-6).
    MCP tools are called via JSON-RPC 2.0 over HTTP on the SA-6 MCP server.
  icon: "\U0001F527"
  icon_background: "#E8F0F4"
  mode: workflow
  name: DCE-AO-SA6-Static-Configuration
  use_icon_as_answer_icon: false

kind: app
version: 0.6.0

# ────────────────────────────────────────────────────────────────────
# IMPORTANT — Post-Import Configuration Required:
# 1. Open node 6000000003 (KB-6 DCE Product Reference Retrieval)
#    → select your "KB-6 DCE Product Reference" dataset
# 2. MCP_ENDPOINT below points to SA-6 server at host.docker.internal:8004
#    (works with Colima on macOS; update for production OCP service mesh)
# ────────────────────────────────────────────────────────────────────

workflow:
  conversation_variables: []
  environment_variables:
  - description: SA-6 MCP server endpoint (local Docker host on port 8004)
    id: env-mcp-endpoint-sa6
    name: MCP_ENDPOINT
    selector:
    - env
    - MCP_ENDPOINT
    value: http://host.docker.internal:8004
    value_type: string
  features:
    file_upload:
      allowed_file_extensions: []
      allowed_file_types: []
      allowed_file_upload_methods: []
      enabled: false
      fileUploadConfig:
        file_size_limit: 15
        image_file_size_limit: 10
    opening_statement: ""
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ""
      voice: ""

  graph:
    edges:
      # ── Phase 1 (TRIGGER) edges ──────────────────────────
      # START → Phase Router
      - data: {isInIteration: false, sourceType: start, targetType: if-else}
        id: e-6001-6002
        source: "6000000001"
        target: "6000000002"
        type: custom
      # Phase Router → PHASE1 (TRIGGER) → KB-6 Retrieval
      - data: {isInIteration: false, sourceType: if-else, targetType: knowledge-retrieval}
        id: e-6002-6003-trigger
        source: "6000000002"
        sourceHandle: "true"
        target: "6000000003"
        type: custom
      # KB-6 → Get Case Context (Phase 1)
      - data: {isInIteration: false, sourceType: knowledge-retrieval, targetType: code}
        id: e-6003-6004
        source: "6000000003"
        target: "6000000004"
        type: custom
      # Get Context P1 → Build Config Spec
      - data: {isInIteration: false, sourceType: code, targetType: code}
        id: e-6004-6005
        source: "6000000004"
        target: "6000000005"
        type: custom
      # Build Config Spec → Generate TMO Instruction LLM
      - data: {isInIteration: false, sourceType: code, targetType: llm}
        id: e-6005-6006
        source: "6000000005"
        target: "6000000006"
        type: custom
      # Generate TMO Instruction LLM → Persist TMO Instruction
      - data: {isInIteration: false, sourceType: llm, targetType: code}
        id: e-6006-6007
        source: "6000000006"
        target: "6000000007"
        type: custom
      # Persist TMO Instruction → Park for TMO Execution
      - data: {isInIteration: false, sourceType: code, targetType: code}
        id: e-6007-6008
        source: "6000000007"
        target: "6000000008"
        type: custom
      # Park for TMO Execution → END HITL_PENDING
      - data: {isInIteration: false, sourceType: code, targetType: end}
        id: e-6008-6009
        source: "6000000008"
        target: "6000000009"
        type: custom

      # ── Phase 2 (RESUME) edges ───────────────────────────
      # Phase Router → PHASE2 (RESUME) → Get Context P2
      - data: {isInIteration: false, sourceType: if-else, targetType: code}
        id: e-6002-6010-resume
        source: "6000000002"
        sourceHandle: "false"
        target: "6000000010"
        type: custom
      # Get Context P2 → TMO Execution Status Check
      - data: {isInIteration: false, sourceType: code, targetType: code}
        id: e-6010-6011
        source: "6000000010"
        target: "6000000011"
        type: custom
      # TMO Execution Status Check → TMO Status Router
      - data: {isInIteration: false, sourceType: code, targetType: if-else}
        id: e-6011-6012
        source: "6000000011"
        target: "6000000012"
        type: custom
      # TMO Status Router [false] → END TMO_NOT_READY
      - data: {isInIteration: false, sourceType: if-else, targetType: end}
        id: e-6012-6013-notready
        source: "6000000012"
        sourceHandle: "false"
        target: "6000000013"
        type: custom
      # TMO Status Router [true] → Validate System Config
      - data: {isInIteration: false, sourceType: if-else, targetType: code}
        id: e-6012-6014-confirmed
        source: "6000000012"
        sourceHandle: "true"
        target: "6000000014"
        type: custom
      # Validate System Config → Validation Outcome Router
      - data: {isInIteration: false, sourceType: code, targetType: if-else}
        id: e-6014-6015
        source: "6000000014"
        target: "6000000015"
        type: custom
      # Validation Outcome Router [true] → Complete Node Validated
      - data: {isInIteration: false, sourceType: if-else, targetType: code}
        id: e-6015-6016-pass
        source: "6000000015"
        sourceHandle: "true"
        target: "6000000016"
        type: custom
      # Complete Node Validated → END TMO_VALIDATED
      - data: {isInIteration: false, sourceType: code, targetType: end}
        id: e-6016-6017
        source: "6000000016"
        target: "6000000017"
        type: custom
      # Validation Outcome Router [false] → Complete Node Discrepancy
      - data: {isInIteration: false, sourceType: if-else, targetType: code}
        id: e-6015-6018-fail
        source: "6000000015"
        sourceHandle: "false"
        target: "6000000018"
        type: custom
      # Complete Node Discrepancy → END TMO_DISCREPANCY
      - data: {isInIteration: false, sourceType: code, targetType: end}
        id: e-6018-6019
        source: "6000000018"
        target: "6000000019"
        type: custom

    nodes:
      # ────────────────────────────────────────────────────
      # Node 1: START
      # ────────────────────────────────────────────────────
      - data:
          desc: "Entry point for both TRIGGER (Phase 1) and RESUME (Phase 2) modes"
          title: START
          type: start
          variables:
            - label: case_id
              max_length: 30
              options: []
              required: true
              type: text-input
              variable: case_id
            - label: mode
              max_length: 20
              options: []
              required: true
              type: text-input
              variable: mode
            - label: hitl_task_id
              max_length: 20
              options: []
              required: false
              type: text-input
              variable: hitl_task_id
            - label: system_confirmations_json
              max_length: 8000
              options: []
              required: false
              type: paragraph
              variable: system_confirmations_json
        id: "6000000001"
        position: {x: 50, y: 300}
        type: start

      # ────────────────────────────────────────────────────
      # Node 2: Phase Router (TRIGGER vs RESUME)
      # ────────────────────────────────────────────────────
      - data:
          cases:
            - case_id: "true"
              conditions:
                - comparison_operator: is
                  id: c-phase-trigger
                  value: TRIGGER
                  varType: string
                  variable_selector: ["6000000001", mode]
              logical_operator: and
          desc: "Routes to Phase 1 (TRIGGER) or Phase 2 (RESUME) based on mode input"
          title: "Phase Router"
          type: if-else
        id: "6000000002"
        position: {x: 250, y: 300}
        type: if-else

      # ────────────────────────────────────────────────────
      # Node 3: KB-6 DCE Product Reference Retrieval
      # ────────────────────────────────────────────────────
      - data:
          dataset_ids: []
          desc: "Load DCE product reference data, system configuration templates, and TMO instruction standards"
          metadata_filtering_mode: disabled
          multiple_retrieval_config:
            reranking_enable: false
            reranking_mode: weighted_score
            top_k: 6
          query:
            id: q-kb6-sa6
            value_selector: ["6000000001", case_id]
            variable: query
          retrieval_mode: multiple
          single_retrieval_config:
            model:
              completion_params: {temperature: 0.1}
              mode: chat
              name: qwen2.5:32b
              provider: langgenius/ollama/ollama
          title: "KB-6 DCE Product Reference"
          type: knowledge-retrieval
        id: "6000000003"
        position: {x: 500, y: 150}
        type: knowledge-retrieval

      # ────────────────────────────────────────────────────
      # Node 4: Get Case Context (Phase 1)
      # ────────────────────────────────────────────────────
      - data:
          code: |
            import urllib.request, json

            def main(case_id: str, mcp_endpoint: str) -> dict:
                # Initialize MCP session
                init_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 1, "method": "initialize",
                    "params": {"protocolVersion": "2024-11-05",
                               "capabilities": {}, "clientInfo": {"name": "dify-sa6", "version": "1.0"}}
                }).encode()
                init_resp = urllib.request.urlopen(urllib.request.Request(
                    f"{mcp_endpoint}/mcp", data=init_payload, headers={
                        "Content-Type": "application/json",
                        "Accept": "application/json, text/event-stream"
                    }, method="POST"), timeout=30)
                session_id = init_resp.headers.get("mcp-session-id", "")
                headers = {
                    "Content-Type": "application/json",
                    "Accept": "application/json, text/event-stream",
                    "Mcp-Session-Id": session_id,
                }
                # Call sa6_get_case_context (Phase 1)
                tool_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                    "params": {"name": "sa6_get_case_context",
                               "arguments": {"case_id": case_id, "phase": "PHASE1"}}
                }).encode()
                req = urllib.request.Request(f"{mcp_endpoint}/mcp", data=tool_payload, headers=headers, method="POST")
                resp = urllib.request.urlopen(req, timeout=30)
                raw = resp.read().decode()
                result = next((json.loads(l[6:]) for l in raw.split('\n') if l.startswith('data: ')), {})
                is_error = result.get("result", {}).get("isError", False)
                content = result.get("result", {}).get("content", [{}])
                text = content[0].get("text", "{}") if content else "{}"
                try:
                    parsed = json.loads(text)
                except (json.JSONDecodeError, ValueError):
                    parsed = {"raw_text": text, "parse_error": True}
                if is_error:
                    parsed["mcp_error"] = True
                return {"result": parsed}
          code_language: python3
          desc: "Fetch case state, entity data, credit decisions, N-4 output, trader list, and product config for Phase 1"
          outputs:
            result: {children: null, type: object}
          title: "Get Case Context (Phase 1)"
          type: code
          variables:
            - value_selector: ["6000000001", case_id]
              variable: case_id
            - value_selector: [env, MCP_ENDPOINT]
              variable: mcp_endpoint
        id: "6000000004"
        position: {x: 700, y: 150}
        type: code

      # ────────────────────────────────────────────────────
      # Node 5: Build Config Spec
      # ────────────────────────────────────────────────────
      - data:
          code: |
            import urllib.request, json

            def main(case_id: str, context_result: dict, mcp_endpoint: str) -> dict:
                init_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 1, "method": "initialize",
                    "params": {"protocolVersion": "2024-11-05", "capabilities": {},
                               "clientInfo": {"name": "dify-sa6", "version": "1.0"}}
                }).encode()
                init_resp = urllib.request.urlopen(
                    urllib.request.Request(f"{mcp_endpoint}/mcp", data=init_payload, headers={
                        "Content-Type": "application/json",
                        "Accept": "application/json, text/event-stream"
                    }, method="POST"), timeout=30)
                session_id = init_resp.headers.get("mcp-session-id", "")
                headers = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream", "Mcp-Session-Id": session_id}
                # Extract individual fields from context_result
                classification = context_result.get("classification_result", {})
                credit = context_result.get("credit_decisions", {})
                traders = context_result.get("authorised_traders", [])
                extracted = context_result.get("extracted_data", {})
                case_state = context_result.get("case_state", {})
                entity_name = classification.get("client_name", "") or case_state.get("client_name", "")
                entity_type = classification.get("client_entity_type", "CORP")
                jurisdiction = classification.get("jurisdiction", "") or case_state.get("jurisdiction", "SGP")
                lei_number = extracted.get("lei_number", "") or extracted.get("lei", "") or "PENDING"
                products = classification.get("products_requested", [])
                if isinstance(products, str):
                    try:
                        products = json.loads(products)
                    except (json.JSONDecodeError, ValueError):
                        products = [products]
                if not products:
                    products = ["FUTURES"]
                credit_outcome = credit.get("credit_outcome", "APPROVED")
                approved_limit = float(credit.get("approved_dce_limit_sgd", 0))
                approved_pce = float(credit.get("approved_dce_pce_limit_sgd", 0))
                caa_approach = credit.get("confirmed_caa_approach", "IRB")
                conditions = credit.get("conditions", [])
                if isinstance(conditions, str):
                    try:
                        conditions = json.loads(conditions)
                    except (json.JSONDecodeError, ValueError):
                        conditions = []
                tool_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                    "params": {"name": "sa6_build_config_spec",
                               "arguments": {"case_id": case_id,
                                             "entity_name": entity_name,
                                             "entity_type": entity_type,
                                             "jurisdiction": jurisdiction,
                                             "lei_number": lei_number,
                                             "products_requested": products,
                                             "credit_outcome": credit_outcome,
                                             "approved_dce_limit_sgd": approved_limit,
                                             "approved_dce_pce_limit_sgd": approved_pce,
                                             "confirmed_caa_approach": caa_approach,
                                             "authorised_traders": traders,
                                             "conditions": conditions}}
                }).encode()
                req = urllib.request.Request(f"{mcp_endpoint}/mcp", data=tool_payload, headers=headers, method="POST")
                resp = urllib.request.urlopen(req, timeout=60)
                raw = resp.read().decode()
                result = next((json.loads(l[6:]) for l in raw.split('\n') if l.startswith('data: ')), {})
                is_error = result.get("result", {}).get("isError", False)
                content = result.get("result", {}).get("content", [{}])
                text = content[0].get("text", "{}") if content else "{}"
                try:
                    parsed = json.loads(text)
                except (json.JSONDecodeError, ValueError):
                    parsed = {"raw_text": text, "parse_error": True}
                if is_error:
                    parsed["mcp_error"] = True
                return {"result": parsed}
          code_language: python3
          desc: "Build configuration specification from entity data, credit decisions, and trader list via MCP"
          outputs:
            result: {children: null, type: object}
          title: "Build Config Spec"
          type: code
          variables:
            - value_selector: ["6000000001", case_id]
              variable: case_id
            - value_selector: ["6000000004", result]
              variable: context_result
            - value_selector: [env, MCP_ENDPOINT]
              variable: mcp_endpoint
        id: "6000000005"
        position: {x: 900, y: 150}
        type: code

      # ────────────────────────────────────────────────────
      # Node 6: Generate TMO Instruction (LLM — Qwen/Ollama)
      # ────────────────────────────────────────────────────
      - data:
          context:
            enabled: true
            variable_selector: ["6000000003", result]
          desc: "Generate structured TMO instruction document from config spec using LLM"
          model:
            completion_params:
              max_tokens: 4096
              temperature: 0.3
            mode: chat
            name: qwen2.5:32b
            provider: langgenius/ollama/ollama
          variables:
            - variable: kb6_result
              value_selector: ["6000000003", result]
            - variable: case_id_val
              value_selector: ["6000000001", case_id]
            - variable: config_spec
              value_selector: ["6000000005", result]
            - variable: context_result
              value_selector: ["6000000004", result]
          prompt_template:
            - id: sys-sa6
              role: system
              text: |
                You are the DCE Static Configuration Specialist at ABS Bank.
                Generate a complete TMO (Technology & Market Operations) instruction document
                for system configuration based on the config spec for this new account opening case.

                MANDATORY RULES:
                1. Produce structured JSON output with the exact keys specified below.
                2. Each system section must include step-by-step instructions for TMO operators.
                3. Include all trader setup details with user IDs and permission levels.
                4. Generate a validation checklist for post-configuration verification.
                5. Reference KB-6 product data for system-specific configuration parameters.

                DCE PRODUCT REFERENCE DATA (KB-6):
                {{kb6_result}}

                OUTPUT FORMAT (JSON with these exact keys):
                {
                  "ubix_instructions": "Step-by-step UBIX system configuration instructions",
                  "sic_instructions": "Step-by-step SIC system configuration instructions",
                  "cv_instructions": "Step-by-step CV (Client View) system configuration instructions",
                  "trader_setup": "Trader access provisioning instructions with user IDs and permissions",
                  "validation_checklist": "Post-configuration validation checklist items"
                }
            - id: user-sa6
              role: user
              text: |
                Case ID: {{case_id_val}}

                Case Context & Entity Data:
                {{context_result}}

                Configuration Specification (entity, credit decisions, traders):
                {{config_spec}}

                Please generate the complete TMO instruction document now.
                Output must be valid JSON with keys: ubix_instructions, sic_instructions, cv_instructions, trader_setup, validation_checklist.
                Each value should contain detailed step-by-step instructions for TMO operators.
          title: "Generate TMO Instruction (LLM)"
          type: llm
          vision:
            configs:
              detail: high
            enabled: false
        id: "6000000006"
        position: {x: 1100, y: 150}
        type: llm

      # ────────────────────────────────────────────────────
      # Node 7: Persist TMO Instruction
      # ────────────────────────────────────────────────────
      - data:
          code: |
            import urllib.request, json

            def main(case_id: str, config_spec: dict, llm_instruction: str,
                     mcp_endpoint: str) -> dict:
                init_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 1, "method": "initialize",
                    "params": {"protocolVersion": "2024-11-05", "capabilities": {},
                               "clientInfo": {"name": "dify-sa6", "version": "1.0"}}
                }).encode()
                init_resp = urllib.request.urlopen(
                    urllib.request.Request(f"{mcp_endpoint}/mcp", data=init_payload, headers={
                        "Content-Type": "application/json",
                        "Accept": "application/json, text/event-stream"
                    }, method="POST"), timeout=30)
                session_id = init_resp.headers.get("mcp-session-id", "")
                headers = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream", "Mcp-Session-Id": session_id}
                # Parse LLM output as JSON instruction document
                try:
                    instruction_doc = json.loads(llm_instruction) if isinstance(llm_instruction, str) else llm_instruction
                except (json.JSONDecodeError, ValueError):
                    instruction_doc = {"raw_instruction": llm_instruction}
                # Get spec_id from config_spec result
                spec_id = config_spec.get("spec_id", "")
                tool_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                    "params": {"name": "sa6_generate_tmo_instruction",
                               "arguments": {"case_id": case_id,
                                             "spec_id": spec_id,
                                             "instruction_document": instruction_doc,
                                             "generated_by_model": "qwen2.5:32b"}}
                }).encode()
                req = urllib.request.Request(f"{mcp_endpoint}/mcp", data=tool_payload, headers=headers, method="POST")
                resp = urllib.request.urlopen(req, timeout=30)
                raw = resp.read().decode()
                result = next((json.loads(l[6:]) for l in raw.split('\n') if l.startswith('data: ')), {})
                is_error = result.get("result", {}).get("isError", False)
                content = result.get("result", {}).get("content", [{}])
                text = content[0].get("text", "{}") if content else "{}"
                try:
                    parsed = json.loads(text)
                except (json.JSONDecodeError, ValueError):
                    parsed = {"raw_text": text, "parse_error": True}
                if is_error:
                    parsed["mcp_error"] = True
                return {
                    "result": parsed,
                    "instruction_id": parsed.get("instruction_id", ""),
                    "instruction_url": parsed.get("instruction_url", ""),
                }
          code_language: python3
          desc: "Persist TMO instruction document to database; return instruction_id and instruction_url"
          outputs:
            result: {children: null, type: object}
            instruction_id: {children: null, type: string}
            instruction_url: {children: null, type: string}
          title: "Persist TMO Instruction"
          type: code
          variables:
            - value_selector: ["6000000001", case_id]
              variable: case_id
            - value_selector: ["6000000005", result]
              variable: config_spec
            - value_selector: ["6000000006", text]
              variable: llm_instruction
            - value_selector: [env, MCP_ENDPOINT]
              variable: mcp_endpoint
        id: "6000000007"
        position: {x: 1300, y: 150}
        type: code

      # ────────────────────────────────────────────────────
      # Node 8: Park for TMO Execution
      # ────────────────────────────────────────────────────
      - data:
          code: |
            import urllib.request, json, datetime

            def main(case_id: str, context_result: dict, instruction_result: dict,
                     config_spec_result: dict, mcp_endpoint: str) -> dict:
                init_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 1, "method": "initialize",
                    "params": {"protocolVersion": "2024-11-05", "capabilities": {},
                               "clientInfo": {"name": "dify-sa6", "version": "1.0"}}
                }).encode()
                init_resp = urllib.request.urlopen(
                    urllib.request.Request(f"{mcp_endpoint}/mcp", data=init_payload, headers={
                        "Content-Type": "application/json",
                        "Accept": "application/json, text/event-stream"
                    }, method="POST"), timeout=30)
                session_id = init_resp.headers.get("mcp-session-id", "")
                headers = {"Content-Type": "application/json", "Accept": "application/json, text/event-stream", "Mcp-Session-Id": session_id}
                instruction_id = instruction_result.get("instruction_id", "")
                instruction_url = instruction_result.get("instruction_url", "")
                spec_id = config_spec_result.get("spec_id", "")
                rm_hierarchy = context_result.get("rm_hierarchy", {})
                rm_id = rm_hierarchy.get("rm_id", "RM-DEFAULT")
                case_state = context_result.get("case_state", {})
                priority = case_state.get("priority", "STANDARD")
                # SLA: 2 biz days (48h) for URGENT, 5 biz days (120h) for STANDARD
                sla_hours = 48 if priority == "URGENT" else 120
                deadline_dt = datetime.datetime.now() + datetime.timedelta(hours=sla_hours)
                hitl_deadline = deadline_dt.strftime("%Y-%m-%d %H:%M:%S")
                tool_payload = json.dumps({
                    "jsonrpc": "2.0", "id": 2, "method": "tools/call",
                    "params": {"name": "sa6_park_for_tmo_execution",
                               "arguments": {"case_id": case_id,
                                             "spec_id": spec_id,
                                             "instruction_id": instruction_id,
                                             "instruction_url": instruction_url,
                                             "rm_id": rm_id,
                                             "priority": priority,
                                             "hitl_deadline": hitl_deadline}}
                }).encode()
                req = urllib.request.Request(f"{mcp_endpoint}/mcp", data=tool_payload, headers=headers, method="POST")
                resp = urllib.request.urlopen(req, timeout=30)
                raw = resp.read().decode()
                result = next((json.loads(l[6:]) for l in raw.split('\n') if l.startswith('data: ')), {})
                is_error = result.get("result", {}).get("isError", False)
                content = result.get("result", {}).get("content", [{}])
                text = content[0].get("text", "{}") if content else "{}"
                try:
                    parsed = json.loads(text)
