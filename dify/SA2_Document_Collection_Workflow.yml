    - data:
        code: "import json\nimport urllib.request\nimport re\n\nHEADERS = {\"Content-Type\"\
          : \"application/json\", \"Accept\": \"application/json, text/event-stream\"\
          }\n\n\ndef mcp_call(mcp_url, method_name, arguments, req_id=1):\n    body\
          \ = json.dumps({\n        \"jsonrpc\": \"2.0\", \"id\": req_id,\n      \
          \  \"method\": \"initialize\",\n        \"params\": {\"protocolVersion\"\
          : \"2025-03-26\", \"capabilities\": {},\n                   \"clientInfo\"\
          : {\"name\": \"dify-sa2\", \"version\": \"1.0\"}}\n    }).encode()\n   \
          \ req = urllib.request.Request(mcp_url, data=body, headers=HEADERS, method=\"\
          POST\")\n    resp = urllib.request.urlopen(req, timeout=30)\n    resp.read()\n\
          \    session_id = resp.headers.get(\"Mcp-Session-Id\", \"\")\n    h = dict(HEADERS)\n\
          \    h[\"Mcp-Session-Id\"] = session_id\n    tool_body = json.dumps({\n\
          \        \"jsonrpc\": \"2.0\", \"id\": req_id + 1,\n        \"method\":\
          \ \"tools/call\",\n        \"params\": {\"name\": method_name, \"arguments\"\
          : arguments}\n    }).encode()\n    req2 = urllib.request.Request(mcp_url,\
          \ data=tool_body, headers=h, method=\"POST\")\n    resp2 = urllib.request.urlopen(req2,\
          \ timeout=60)\n    raw = resp2.read().decode()\n    match = re.search(r'\"\
          result\"\\s*:\\s*(\\{[\\s\\S]*?\\}|\\[[\\s\\S]*?\\])', raw)\n    if match:\n\
          \        return match.group(1)\n    for line in raw.split(\"\\n\"):\n  \
          \      if line.startswith(\"data:\"):\n            return line[5:].strip()\n\
          \    return raw\n\n\ndef main(case_id: str, account_type: str, jurisdiction:\
          \ str,\n         kb_chunks: str, submitted_documents_parsed: str,\n     \
          \    mcp_endpoint: str) -> dict:\n    MCP_URL = mcp_endpoint + \"/mcp\"\
          \ if mcp_endpoint else \"https://dcemcptools-production.up.railway.app/mcp\"\
          \n    try:\n        args = {\n            \"case_id\": case_id,\n       \
          \     \"account_type\": account_type,\n            \"jurisdiction\": jurisdiction,\n\
          \            \"kb_context\": (kb_chunks or \"\")[:2000]\n        }\n   \
          \     result = mcp_call(MCP_URL, \"sa2_get_document_checklist\", args, 1)\n        try:\n\
          \            checklist_data = json.loads(result)\n        except Exception:\n\
          \            checklist_data = {\"mandatory_docs\": [], \"optional_docs\"\
          : [], \"raw\": str(result)[:500]}\n        return {\n            \"checklist_json\"\
          : json.dumps(checklist_data),\n            \"checklist_source\": \"MCP_GENERATED\"\
          ,\n            \"checklist_error\": \"\"\n        }\n    except Exception\
          \ as e:\n        return {\n            \"checklist_json\": json.dumps({\"\
          mandatory_docs\": [], \"optional_docs\": []}),\n            \"checklist_source\"\
          : \"ERROR_FALLBACK\",\n            \"checklist_error\": str(e)[:200]\n \
          \       }\n"
        code_language: python3
        desc: Calls MCP get_document_checklist to create the definitive checklist
