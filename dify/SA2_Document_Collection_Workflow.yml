    - data:
        code: "import json\n\n\ndef main(case_state_block: str, case_id: str, account_type:\
          \ str,\n         jurisdiction: str, submitted_documents_json: str,\n   \
          \      retry_count: str, prior_failure_reasons_json: str) -> dict:\n   \
          \ retry = int(retry_count) if retry_count and retry_count.strip().isdigit()\
          \ else 0\n    is_retry = retry > 0\n    try:\n        submitted_docs = json.loads(submitted_documents_json)\
          \ if submitted_documents_json else []\n    except Exception:\n        submitted_docs\
          \ = []\n    try:\n        prior_failures = json.loads(prior_failure_reasons_json)\
          \ if prior_failure_reasons_json else []\n    except Exception:\n       \
          \ prior_failures = []\n    retry_context = \"\"\n    if is_retry and prior_failures:\n\
          \        last = prior_failures[-1]\n        retry_context = (\n        \
          \    \"RETRY CONTEXT — THIS IS ATTEMPT {} OF 3 MAXIMUM\\n\"\n          \
          \  \"Prior attempt failed at: {}\\n\"\n            \"Failure type: {}\\\
          n\"\n            \"Detail: {}\\n\"\n            \"CORRECTIVE INSTRUCTION:\
          \ Process only newly submitted documents. \"\n            \"Do NOT re-validate\
          \ documents already accepted in prior attempts.\"\n        ).format(\n \
          \           retry + 1,\n            last.get(\"failed_at\", \"unknown\"\
          ),\n            last.get(\"failure_type\", \"UNKNOWN\"),\n            last.get(\"\
          failure_detail\", \"\")\n        )\n    doc_ids = [d.get(\"doc_id\", \"\"\
          ) for d in submitted_docs]\n    return {\n        \"case_id_ctx\": case_id,\n\
          \        \"account_type_ctx\": account_type,\n        \"jurisdiction_ctx\"\
          : jurisdiction,\n        \"retry_count_int\": str(retry),\n        \"is_retry\"\
          : str(is_retry).lower(),\n        \"submitted_doc_ids_json\": json.dumps(doc_ids),\n\
          \        \"submitted_documents_parsed\": submitted_documents_json or \"\
          []\",\n        \"doc_count\": str(len(submitted_docs)),\n        \"retry_context\"\
          : retry_context,\n        \"prior_failures_json\": prior_failure_reasons_json\
          \ or \"[]\"\n    }\n"
        code_language: python3
