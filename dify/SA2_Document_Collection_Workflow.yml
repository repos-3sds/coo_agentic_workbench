    - data:
        code: "import json\nimport urllib.request\nimport re\n\nHEADERS = {\"Content-Type\"\
          : \"application/json\", \"Accept\": \"application/json, text/event-stream\"\
          }\n\n\ndef mcp_call(mcp_url, method_name, arguments, req_id=1):\n    body\
          \ = json.dumps({\n        \"jsonrpc\": \"2.0\", \"id\": req_id,\n      \
          \  \"method\": \"initialize\",\n        \"params\": {\"protocolVersion\"\
          : \"2025-03-26\", \"capabilities\": {},\n                   \"clientInfo\"\
          : {\"name\": \"dify-sa2\", \"version\": \"1.0\"}}\n    }).encode()\n   \
          \ req = urllib.request.Request(mcp_url, data=body, headers=HEADERS, method=\"\
          POST\")\n    resp = urllib.request.urlopen(req, timeout=30)\n    resp.read()\n\
          \    session_id = resp.headers.get(\"Mcp-Session-Id\", \"\")\n    h = dict(HEADERS)\n\
          \    h[\"Mcp-Session-Id\"] = session_id\n    tool_body = json.dumps({\n\
          \        \"jsonrpc\": \"2.0\", \"id\": req_id + 1,\n        \"method\":\
          \ \"tools/call\",\n        \"params\": {\"name\": method_name, \"arguments\"\
          : arguments}\n    }).encode()\n    req2 = urllib.request.Request(mcp_url,\
          \ data=tool_body, headers=h, method=\"POST\")\n    resp2 = urllib.request.urlopen(req2,\
          \ timeout=60)\n    raw = resp2.read().decode()\n    match = re.search(r'\"\
          result\"\\s*:\\s*(\\{[\\s\\S]*?\\}|\\[[\\s\\S]*?\\])', raw)\n    if match:\n\
          \        return match.group(1)\n    for line in raw.split(\"\\n\"):\n  \
          \      if line.startswith(\"data:\"):\n            return line[5:].strip()\n\
          \    return raw\n\n\ndef main(validated_completeness_json: str, decision_json:\
          \ str,\n         chase_llm_text: str, case_id: str, retry_count_int: str,\n\
          \         mcp_endpoint: str) -> dict:\n    MCP_URL = mcp_endpoint + \"/mcp\"\
          \ if mcp_endpoint else \"https://dcemcptools-production.up.railway.app/mcp\"\
          \n    try:\n        comp = json.loads(validated_completeness_json)\
          \ if validated_completeness_json else {}\n    except Exception:\n      \
          \  comp = {}\n    try:\n        m = re.search(r'\\{[\\s\\S]*\\}', decision_json)\n\
          \        dec = json.loads(m.group()) if m else {}\n    except Exception:\n\
          \        dec = {}\n    next_node = dec.get(\"next_node\", \"DEAD\")\n  \
          \  retry_recommended = dec.get(\"retry_recommended\", False)\n    n1_output\
          \ = dict(comp)\n    n1_output[\"next_node\"] = next_node\n    n1_output[\"\
          retry_recommended\"] = retry_recommended\n    n1_output[\"failure_reason\"\
          ] = dec.get(\"failure_reason\")\n    n1_output[\"rm_chase_message\"] = dec.get(\"\
          rm_chase_message\")\n    notify_result = \"\"\n    if retry_recommended\
          \ and chase_llm_text and chase_llm_text.strip():\n        try:\n       \
          \     m2 = re.search(r'\\{[\\s\\S]*\\}', chase_llm_text)\n            chase_data\
          \ = json.loads(m2.group()) if m2 else {}\n            chase_text = chase_data.get(\"\
          chase_message_text\", \"\")\n            recipients = chase_data.get(\"\
          recipients\", [\"RM\"])\n            if chase_text:\n                retry_int\
          \ = int(retry_count_int) if retry_count_int and retry_count_int.strip().isdigit()\
          \ else 0\n                notify_args = {\n                    \"case_id\"\
          : case_id,\n                    \"notification_type\": \"RM_CHASE\",\n \
          \                   \"recipients\": json.dumps(recipients),\n          \
          \          \"message_text\": chase_text,\n                    \"retry_count\"\
          : retry_int\n                }\n                notify_result = str(mcp_call(MCP_URL, \"\
          sa2_send_notification\", notify_args, 300))[:300]\n        except Exception\
          \ as e:\n            notify_result = \"NOTIFY_FAILED: {}\".format(str(e)[:100])\n\
          \    final_output = {\n        \"status\": \"success\",\n        \"case_id\"\
          : case_id,\n        \"n1_output\": n1_output,\n        \"next_node\": next_node,\n\
          \        \"notification_sent\": bool(notify_result and \"FAILED\" not in\
          \ notify_result)\n    }\n    return {\n        \"result_json\": json.dumps(final_output),\n\
          \        \"case_id\": case_id,\n        \"next_node\": next_node\n    }\n"
        code_language: python3
        desc: Assembles final N1Output JSON. If retry_recommended, calls MCP send_notification
