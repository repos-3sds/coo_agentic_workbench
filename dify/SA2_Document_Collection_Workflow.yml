app:
  description: SA-2 Document Collection & Completeness Agent (N-1). Processes submitted
    documents via OCR, generates document checklist from KB-2, assesses completeness
    in parallel with document validity checks, flags rejections, and routes to KYC
    (N-2), RM retry (HITL_RM), Branch Manager escalation (ESCALATE_BRANCH_MANAGER),
    or termination (DEAD). Retries are internal — no DAG back-edge to N-0.
