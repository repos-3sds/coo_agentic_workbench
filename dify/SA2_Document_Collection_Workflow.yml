    - data:
        code: "import json\nimport re\n\nVALID_STATUS = [\"ACCEPTED\", \"REJECTED\"\
          , \"REQUIRES_RESUBMISSION\"]\n\n\ndef main(completeness_json: str, rejection_llm_text:\
          \ str) -> dict:\n    errors = []\n    try:\n        comp = json.loads(completeness_json)\
          \ if completeness_json else {}\n    except Exception:\n        comp = {}\n\
          \        errors.append(\"Bad completeness JSON\")\n    try:\n        m =\
          \ re.search(r'\\{[\\s\\S]*\\}', rejection_llm_text)\n        rej = json.loads(m.group())\
          \ if m else {}\n    except Exception:\n        rej = {}\n    if \"completeness_flag\"\
          \ not in comp:\n        errors.append(\"Missing completeness_flag\")\n \
          \   if \"mandatory_docs_complete\" not in comp:\n        errors.append(\"\
          Missing mandatory_docs_complete\")\n    documents = comp.get(\"documents\"\
          , [])\n    for doc in documents:\n        if doc.get(\"status\") not in\
          \ VALID_STATUS:\n            errors.append(\"Invalid doc status for {}:\
          \ {}\".format(\n                doc.get(\"doc_id\", \"?\"), doc.get(\"status\"\
          )\n            ))\n    rejection_reasons = rej.get(\"rejection_reasons\"\
          , {})\n    enriched_docs = []\n    for doc in documents:\n        d = dict(doc)\n\
          \        if d.get(\"status\") in [\"REJECTED\", \"REQUIRES_RESUBMISSION\"\
          ]:\n            if not d.get(\"rejection_reason\"):\n                d[\"\
          rejection_reason\"] = rejection_reasons.get(\n                    d.get(\"\
          doc_id\", \"\"), \"Document requires review\"\n                )\n     \
          \   enriched_docs.append(d)\n    comp[\"documents\"] = enriched_docs\n \
          \   rejected_docs = [\n        d[\"doc_id\"] for d in enriched_docs if d.get(\"\
          status\") == \"REJECTED\"\n    ]\n    validated_completeness = {\n     \
          \   \"completeness_flag\": comp.get(\"completeness_flag\", False),\n   \
          \     \"mandatory_docs_complete\": comp.get(\"mandatory_docs_complete\"\
          , False),\n        \"optional_docs_complete\": comp.get(\"optional_docs_complete\"\
          , False),\n        \"coverage_pct\": comp.get(\"coverage_pct\", 0.0),\n\
          \        \"documents\": enriched_docs,\n        \"missing_mandatory\": comp.get(\"\
          missing_mandatory\", []),\n        \"missing_optional\": comp.get(\"missing_optional\"\
          , []),\n        \"rejected_docs\": rejected_docs,\n        \"rejection_reasons\"\
          : rejection_reasons,\n        \"gta_valid\": comp.get(\"gta_valid\", True),\n\
          \        \"gta_version_found\": comp.get(\"gta_version_found\"),\n     \
          \   \"gta_issues\": comp.get(\"gta_issues\", [])\n    }\n    is_valid =\
          \ len(errors) == 0\n    return {\n        \"is_valid\": str(is_valid),\n\
          \        \"validated_completeness_json\": json.dumps(validated_completeness),\n\
          \        \"validation_errors\": json.dumps(errors)\n    }\n"
