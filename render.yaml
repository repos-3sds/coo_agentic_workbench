services:
  - type: web
    name: dce_mcp_tools
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8000"
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: DCE_DB_HOST
        sync: false
      - key: DCE_DB_PORT
        value: "3306"
      - key: DCE_DB_USER
        sync: false
      - key: DCE_DB_PASSWORD
        sync: false
      - key: DCE_DB_NAME
        value: dce_agent
    healthCheckPath: /mcp
